<style>
/* 基础设计变量（原版/浅色默认，供"原版"主题回落使用） */
:root{
  --color-background-primary:#ffffff; --color-background-secondary:#f4f4f2; --color-background-tertiary:#ececea;
  --color-text-primary:#1d1d1f; --color-text-secondary:#6e6e73; --color-text-tertiary:#9a9aa0;
  --color-border-tertiary:rgba(0,0,0,.10); --color-border-secondary:rgba(0,0,0,.18); --color-border-info:rgba(14,116,144,.5);
  --color-text-info:#0e7490; --color-background-info:rgba(14,116,144,.10);
  --color-text-success:#15803d; --color-background-success:rgba(21,128,61,.12);
  --color-text-danger:#b91c1c; --color-background-danger:rgba(185,28,28,.10);
  --color-text-warning:#a16207; --color-background-warning:rgba(161,98,7,.12);
  --border-radius-md:8px; --border-radius-lg:12px; --border-radius-xl:16px;
  --font-mono:ui-monospace,Consolas,"Courier New",monospace; --font-sans:system-ui,"Microsoft YaHei",sans-serif;
}
body{margin:0;padding:16px;background:var(--color-background-tertiary);font-family:var(--font-sans)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.jdo .glab{font-size:11px;color:var(--color-text-tertiary);padding:10px 10px 4px;letter-spacing:0.04em;}
.jdo .sbtn{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 10px;border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-secondary);border:none;background:transparent;text-align:left;width:100%;}
.jdo .sbtn:hover{background:var(--color-background-secondary);color:var(--color-text-primary);}
.jdo .sbtn.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500;}
.jdo .tbtn{font-size:11.5px;padding:4px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;}
.jdo .tbtn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);}
.jdo .phead{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding-bottom:11px;margin-bottom:13px;border-bottom:0.5px solid var(--color-border-tertiary);}
.jdo .ptitle{font-size:16px;font-weight:500;color:var(--color-text-primary);}
.jdo .psub{font-size:12px;color:var(--color-text-secondary);margin-top:3px;}
.jdo .tbl{width:100%;border-collapse:collapse;font-size:12.5px;color:var(--color-text-primary);}
.jdo .tbl th{text-align:left;font-weight:500;color:var(--color-text-secondary);padding:8px 7px;border-bottom:0.5px solid var(--color-border-tertiary);}
.jdo .tbl td{padding:8px 7px;border-bottom:0.5px solid var(--color-border-tertiary);}
.jdo .tbl tbody tr.hov:hover{background:var(--color-background-secondary);}
.jdo .badge{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);white-space:nowrap;}
.jdo .b-ok{background:var(--color-background-success);color:var(--color-text-success);}
.jdo .b-fail{background:var(--color-background-danger);color:var(--color-text-danger);}
.jdo .b-run{background:var(--color-background-warning);color:var(--color-text-warning);}
.jdo .b-mut{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
.jdo .b-info{background:var(--color-background-info);color:var(--color-text-info);}
.jdo .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 15px;}
.jdo .mcard{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 13px;}
.jdo .mlab{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.04em;}
.jdo .mnum{font-size:22px;font-weight:500;margin-top:6px;color:var(--color-text-primary);}
.jdo .sub{font-size:12px;color:var(--color-text-secondary);}
.jdo .lnk{color:var(--color-text-info);cursor:pointer;}
.jdo .mdlab{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.03em;}
.jdo .chip{background:var(--color-background-secondary);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--color-text-secondary);}
.jdo .chip b{font-weight:500;color:var(--color-text-primary);margin-left:3px;}
.jdo .iconbtn{border:0.5px solid var(--color-border-secondary);background:transparent;border-radius:var(--border-radius-md);width:28px;height:26px;cursor:pointer;color:var(--color-text-secondary);font-size:14px;display:inline-flex;align-items:center;justify-content:center;padding:0;}
.jdo .iconbtn:hover{background:var(--color-background-secondary);color:var(--color-text-primary);}
.jdo input,.jdo select,.jdo textarea{background:var(--color-background-tertiary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);}
.jdo .pbtn{background:var(--color-text-info);color:#fff;border:1px solid var(--color-text-info);font-weight:500;border-radius:var(--border-radius-md);padding:7px 13px;cursor:pointer;}
.jdo .pbtn:hover{filter:brightness(1.08);}
.jdo .gbtn{background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 13px;cursor:pointer;}
.jdo .gbtn:hover{background:var(--color-background-secondary);color:var(--color-text-primary);}
.jdo .sw{position:relative;width:34px;height:19px;border-radius:10px;background:var(--color-border-secondary);cursor:pointer;display:inline-block;vertical-align:middle;}
.jdo .sw.on{background:var(--color-text-success);}
.jdo .sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;}
.jdo .sw.on::after{left:17px;}
</style>
</head>

  function go(k){ currentKey=k; root.querySelectorAll('.sbtn').forEach(function(b){ b.classList.toggle('active',b.dataset.k===k); }); var cb=root.querySelector('#crumb'); if(cb&&CRUMB[k]) cb.innerHTML='<span style="color:var(--color-text-secondary);">'+CRUMB[k][0]+'</span> <span style="color:var(--color-text-tertiary);">/</span> <span style="color:var(--color-text-primary);">'+CRUMB[k][1]+'</span>'; root.querySelector('#content').innerHTML=S[k](); if(k==='dash')initDash(); if(k==='cases')initCases(); if(k==='scripts')initScripts(); if(k==='tasks')initTasks(); if(k==='reports')initReports(); if(k==='sched')initSched(); if(k==='exec')initExec(); if(k==='cov')initCov(); }

  THEME=themes[DEFAULT];
  go('dash');
  showLogin();
})();
